name: Build Feature Branch

on:
  push:
    branches:
      - feat/*
      - feature/*

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            9.x
            10.x
          cache: true
          cache-dependency-path: "src/LinkupSdk/LinkupSdk.csproj"

      - name: Restore dependencies
        run: dotnet restore src/LinkupSdk/LinkupSdk.csproj

      - name: Build the project
        run: dotnet build src/LinkupSdk/LinkupSdk.csproj --configuration Release --no-restore
