name: Merge to Main Branch

permissions:
  contents: read
  packages: write
  actions: write

on:
  push:
    branches:
      - "main"

env:
  DOTNET_VERSION: "8.0.x"
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  create-release-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for GitVersion

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v0.9.15
        with:
          versionSpec: "5.x"

      - name: Determine Version
        uses: gittools/actions/gitversion/execute@v0.9.15
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml

      - name: Display Version
        run: |
          echo "SemVer: ${{ env.GitVersion_SemVer }}"
          echo "NuGet Version: ${{ env.GitVersion_NuGetVersion }}"

      - name: Create Release Tag
        run: |
          # Create a stable release tag
          STABLE_VERSION="${{ env.GitVersion_Major }}.${{ env.GitVersion_Minor }}.${{ env.GitVersion_Patch }}"
          echo "STABLE_VERSION=$STABLE_VERSION" >> $GITHUB_ENV
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag $STABLE_VERSION
          # Don't push the tag here - let the GitHub API create the tag through the create-release action

      - name: Create Stable Release on GitHub
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.STABLE_VERSION }}
          release_name: Release ${{ env.STABLE_VERSION }}
          body: |
            Release ${{ env.STABLE_VERSION }}

            This is an automatically generated stable release from the main branch.
          draft: false
          prerelease: false

      - name: Restore dependencies
        run: dotnet restore

      - name: Build for .NET 8.0
        run: dotnet build --no-restore --configuration Release --framework net8.0

      - name: Build for .NET 9.0
        run: dotnet build --no-restore --configuration Release --framework net9.0

      - name: Build for .NET 10.0
        run: dotnet build --no-restore --configuration Release --framework net10.0

      - name: Run Tests for .NET 8.0
        run: dotnet test --no-build --configuration Release --framework net8.0 --logger trx --results-directory ./TestResults

      - name: Run Tests for .NET 9.0
        run: dotnet test --no-build --configuration Release --framework net9.0 --logger trx --results-directory ./TestResults

      - name: Run Tests for .NET 10.0
        run: dotnet test --no-build --configuration Release --framework net10.0 --logger trx --results-directory ./TestResults

      - name: Pack NuGet Package
        run: |
          # Use the stable version for the package
          dotnet pack --no-build --configuration Release --output ./nupkgs /p:PackageVersion=${{ env.STABLE_VERSION }}

      - name: Upload NuGet Package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package-stable
          path: ./nupkgs/*.nupkg

      - name: Deploy to GitHub Package Registry
        run: |
          # Get the NuGet package file
          NUPKG_FILE=$(find ./nupkgs -name "*.nupkg" -type f)
          if [ -n "$NUPKG_FILE" ]; then
            dotnet nuget push $NUPKG_FILE --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate
          else
            echo "No NuGet package found to deploy"
            exit 1
          fi

      - name: Deploy to NuGet.org
        run: |
          # Get the NuGet package file
          NUPKG_FILE=$(find ./nupkgs -name "*.nupkg" -type f)
          if [ -n "$NUPKG_FILE" ]; then
            dotnet nuget push $NUPKG_FILE --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          else
            echo "No NuGet package found to deploy"
            exit 1
          fi
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
