name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (e.g., v0.1.0)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            9.x
            10.x
          cache: true
          cache-dependency-path: "src/LinkupSdk/LinkupSdk.csproj"

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v1.1.1
        with:
          versionSpec: "5.x"

      - name: Determine Version
        uses: gittools/actions/gitversion/execute@v1.1.1
        id: gitversion

      - name: Restore dependencies
        run: dotnet restore src/LinkupSdk/LinkupSdk.csproj

      - name: Build the project
        run: dotnet build src/LinkupSdk/LinkupSdk.csproj --configuration Release --no-restore

      - name: Pack the NuGet package
        run: dotnet pack src/LinkupSdk/LinkupSdk.csproj --configuration Release --no-build --output ./nupkg /p:PackageVersion=${{ steps.gitversion.outputs.semVer }}

      - name: Manual Approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: ${{ github.repository_owner }}
          minimum-approvals: 1
          issue-title: "Deploy to NuGet: ${{ steps.gitversion.outputs.semVer }}"
          issue-body: "Please approve or deny the deployment of version ${{ steps.gitversion.outputs.semVer }} to NuGet."

      - name: Publish NuGet package
        run: |
          TAG_NAME="${{ github.event.inputs.tag || github.ref_name }}"
          if [[ "$TAG_NAME" == *-beta* ]]; then
            dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate
          else
            dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          fi
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
