name: Create Release Tag

on:
  push:
    branches:
      - release/*
      - main
  pull_request:
    types: [closed]
    branches:
      - release/*
jobs:
  create-tag:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true && contains(github.event.pull_request.head.ref, 'feat/') || contains(github.event.pull_request.head.ref, 'feature/'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            9.x
            10.x

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v1.1.1
        with:
          versionSpec: "5.x"

      - name: Determine Version
        uses: gittools/actions/gitversion/execute@v1.1.1
        id: gitversion

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.gitversion.outputs.semVer }}
          name: Release v${{ steps.gitversion.outputs.semVer }}
          body: |
            ## Changes in this release
            - Automated release created from ${{ github.ref }}
            - Version: ${{ steps.gitversion.outputs.semVer }}
          draft: false
          prerelease: ${{ contains(github.ref, 'release/') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger NuGet Publish Workflow
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'nuget-publish.yml',
              ref: '${{ github.ref_name }}',
              inputs: {
                tag: 'v${{ steps.gitversion.outputs.semVer }}'
              }
            })
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
