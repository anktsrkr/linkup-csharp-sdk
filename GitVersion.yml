mode: ContinuousDelivery
branches:
  main:
    regex: ^main$
    mode: ContinuousDelivery
    label: ""
    increment: Patch
    prevent-increment:
      of-merged-branch: true
    track-merge-target: false
    tracks-release-branches: false
    is-release-branch: false
    is-mainline: true
    source-branches: []
  master:
    regex: ^master$
    mode: ContinuousDelivery
    label: ""
    increment: Patch
    prevent-increment:
      of-merged-branch: true
    track-merge-target: false
    tracks-release-branches: false
    is-release-branch: false
    is-mainline: true
    source-branches: []
  release:
    regex: ^release[/-]
    mode: ManualDeployment
    label: "beta"
    increment: Patch
    prevent-increment:
      of-merged-branch: false
    track-merge-target: false
    tracks-release-branches: false
    is-release-branch: true
    is-mainline: false
    source-branches: ["main", "master"]
  feature:
    regex: ^feat(ure)?[/-]
    mode: ManualDeployment
    label: "{BranchName}"
    increment: Inherit
    prevent-increment:
      of-merged-branch: true
    track-merge-target: false
    tracks-release-branches: false
    is-release-branch: false
    is-mainline: false
    source-branches: ["main", "master"]

ignore:
  sha: []

merge-message-formats: {}

# Version formatting configuration
assembly-versioning-scheme: MajorMinor
assembly-file-versioning-scheme: MajorMinor
assembly-informational-format: "{Major}.{Minor}.x"
major-version-bump-message: '\+semver:\s?(breaking|major)'
minor-version-bump-message: '\+semver:\s?(feature|minor)'
patch-version-bump-message: '\+semver:\s?(fix|patch)'
no-bump-message: '\+semver:\s?(none|skip)'

# Initial version configuration
next-version: 1.0.0

